<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-Codes - Lagerverwaltung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; padding: 24px; background: #f8fafc; }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p  { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; text-align: center; break-inside: avoid; }
    .card img { width: 120px; height: 120px; display: block; margin: 0 auto 10px; }
    .box-id  { font-size: 14px; font-weight: 700; color: #1e293b; }
    .box-lbl { font-size: 12px; color: #64748b; margin-top: 3px; }
    @media print {
      body { padding: 10px; background: white; }
      p, h1 { display: none; }
      .grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .card { border: 1px solid #ccc; padding: 10px; }
      .card img { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>
  <h1>Lagerverwaltung - QR-Codes</h1>
  <p>Strg+P / Cmd+P zum Drucken. QR-Codes auf die Euroboxen kleben.</p>
  <div class="grid">
    <div class="card">
      <img src="BOX-001.png" alt="BOX-001">
      <div class="box-id">BOX-001</div>
      <div class="box-lbl">Malerbedarf</div>
    </div>

    <div class="card">
      <img src="BOX-002.png" alt="BOX-002">
      <div class="box-id">BOX-002</div>
      
    </div>

    <div class="card">
      <img src="BOX-003.png" alt="BOX-003">
      <div class="box-id">BOX-003</div>
      
    </div>

    <div class="card">
      <img src="BOX-004.png" alt="BOX-004">
      <div class="box-id">BOX-004</div>
      
    </div>

    <div class="card">
      <img src="BOX-005.png" alt="BOX-005">
      <div class="box-id">BOX-005</div>
      
    </div>

    <div class="card">
      <img src="BOX-006.png" alt="BOX-006">
      <div class="box-id">BOX-006</div>
      
    </div>

    <div class="card">
      <img src="BOX-007.png" alt="BOX-007">
      <div class="box-id">BOX-007</div>
      
    </div>

    <div class="card">
      <img src="BOX-008.png" alt="BOX-008">
      <div class="box-id">BOX-008</div>
      
    </div>

    <div class="card">
      <img src="BOX-009.png" alt="BOX-009">
      <div class="box-id">BOX-009</div>
      
    </div>

    <div class="card">
      <img src="BOX-010.png" alt="BOX-010">
      <div class="box-id">BOX-010</div>
      
    </div>
  </div>
</body>
</html>
