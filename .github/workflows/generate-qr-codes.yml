name: QR-Codes generieren

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'boxes/*.md'
      - 'scripts/generate-qr.js'

permissions:
  contents: write

jobs:
  generate-qr-codes:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: qrcode Bibliothek installieren
        run: npm install qrcode

      - name: QR-Codes generieren
        run: node scripts/generate-qr.js

      - name: QR-Codes committen und pushen
        run: |
          git config user.name  "Warehouse Bot"
          git config user.email "warehouse-bot@users.noreply.github.com"
          git add qr-codes/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen."
            exit 0
          fi
          git commit -m "QR-Codes aktualisiert"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
